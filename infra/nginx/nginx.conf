# infra/nginx/nginx.conf
# Faz 1 — Wildcard subdomain yönlendirme
# Local geliştirmede *.localhost → backend/frontend proxy

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Subdomain'i değişkene yakala
    map $host $tenant_slug {
        ~^(?P<slug>[^.]+)\.localhost$  $slug;
        ~^(?P<slug>[^.]+)\.themembro\.com$  $slug;
        default  "";
    }

    # API mi frontend mi?
    map $uri $is_api {
        ~^/api/   1;
        ~^/docs   1;
        ~^/openapi 1;
        default   0;
    }

    # ─── Backend API ─────────────────────────────────────────
    upstream backend {
        server backend:8000;
    }

    # ─── Frontend ─────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name ~^(?P<slug>[^.]+)\.(localhost|themembro\.com)$;

        # Tenant slug → backend'e header ile ilet
        set $tenant $slug;

        # API istekleri → FastAPI
        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   X-Tenant-Slug $tenant;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # FastAPI docs (dev only)
        location ~ ^/(docs|redoc|openapi\.json) {
            proxy_pass         http://backend;
            proxy_set_header   X-Tenant-Slug $tenant;
            proxy_set_header   Host $host;
        }

        # Diğer her şey → Next.js
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   X-Tenant-Slug $tenant;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            # Next.js HMR için WebSocket desteği
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }

    # Ana domain (tenant slug'sız) → marketing / login sayfası
    server {
        listen 80;
        server_name localhost themembro.com;

        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
